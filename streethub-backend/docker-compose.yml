services:
  postgres:
    image: postgres:16-alpine
    container_name: streethub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IMPORTHUB_DB_NAME:-importhub}
      POSTGRES_USER: ${IMPORTHUB_DB_USERNAME:-importhub}
      POSTGRES_PASSWORD: ${IMPORTHUB_DB_PASSWORD:-nick1234}
    ports:
      - "5433:5432"
    volumes:
      - streethub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IMPORTHUB_DB_USERNAME:-importhub} -d ${IMPORTHUB_DB_NAME:-importhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  streethub_postgres_data:
