spring:
  application:
    name: streethub-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/streethub
    username: streethub
    password: streethub
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

jwt:
  # base64 secret for HMAC. Replace in production with a secure random key
  secret: VGhpcyBpcyBhIHNhbXBsZS1zZWNyZXQtc3RyaW5nLWFuZC1zaG91bGQtYmUtY2hhbmdlZA==
  expiration-ms: 86400000

server:
  port: 3001

management:
  endpoints:
    web:
      exposure:
        include: health,info
