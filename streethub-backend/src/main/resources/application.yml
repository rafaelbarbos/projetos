spring:
  application:
    name: streethub-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/streethub
    username: streethub
    password: streethub
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 3001

management:
  endpoints:
    web:
      exposure:
        include: health,info
